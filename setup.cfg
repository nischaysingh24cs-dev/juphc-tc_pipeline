[nosetests]
verbosity=2
with-spec=1
spec-color=1
with-coverage=1
cover-erase=1
cover-package=simple_interest_calculator

[coverage:run]
omit = tests/*,**/__main__.py
branch = True

[coverage:report]
show_missing = True
skip_covered = True
fail_under = 90

[flake8]
enable-extensions = G
exclude = .git, .venv, __pycache__, build, dist
ignore = E501, W503
max-complexity = 10
max-line-length = 127
show-source = True

[pylint]
good-names = i,j,k,e,x,_,pk,id
max-args = 5
max-attributes = 10
max-bool-expr = 5
max-branches = 10
max-locals = 15
max-module-lines = 500
max-nested-blocks = 3
max-public-methods = 10
max-returns = 5
max-statements = 25
output-format = colorized
disable = C0103, C0111, R0903, R0201
