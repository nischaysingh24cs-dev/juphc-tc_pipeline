<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Travel Recommendations</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f4f4f9; }
        header { background: #2c3e50; color: #fff; padding: 1rem; text-align: center; }
        nav { display: flex; justify-content: center; background: #34495e; padding: 0.5rem; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 600px; margin: 30px auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-submit { background-color: #3498db; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn-submit:hover { background-color: #2980b9; }
        .contact-info { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        footer { text-align: center; padding: 10px; background: #2c3e50; color: white; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>Contact Us</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <div class="container">
        <div class="contact-info">
            <h2>Our Contact Information</h2>
            <p><strong>Email:</strong> support@globalexplorers.local</p>
            <p><strong>Phone:</strong> +1 (555) 019-2834</p>
            <p><strong>Headquarters:</strong> 100 Travel Way, Suite 400, San Francisco, CA</p>
        </div>

        <h2>Send Us a Message</h2>
        <form action="mailto:support@globalexplorers.local" method="post" enctype="text/plain">
            <div class="form-group">
                <label prejudices for="name">Name:</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" placeholder="Your Email" required>
            </div>
            
            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>
            </div>
            
            <button type="submit" class="btn-submit">Send Email</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 Global Explorers. All Rights Reserved.</p>
    </footer>

</body>
</html>
