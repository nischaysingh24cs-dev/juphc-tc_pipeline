apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: tax-calculator-pipeline
spec:
  workspaces:
    - name: pipeline-workspace
  tasks:
    - name: npm-install
      taskRef:
        name: npm
      workspaces:
        - name: source
          workspace: pipeline-workspace

    - name: run-tests
      taskRef:
        name: jasmine
      runAfter:
        - npm-install
      workspaces:
        - name: source
          workspace: pipeline-workspace

    - name: build-app
      taskRef:
        name: build # Or the specific build task name from your lab (e.g., buildah, s2i)
      runAfter:
        - run-tests
      workspaces:
        - name: source
          workspace: pipeline-workspace
